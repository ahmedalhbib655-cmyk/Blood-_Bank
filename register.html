<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - بنك الدم الخيري</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="login-page">
        <div class="login-container">
            <div class="login-form">
                <div class="logo-login">🩸 <span>بنك الدم</span> الخيري</div>
                <h2>📝 إنشاء حساب جديد</h2>
                <form id="register-form">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="reg-name" required>
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="form-group">
                        <label>رقم الجوال</label>
                        <input type="tel" id="reg-phone" required>
                    </div>
                    <div class="form-group">
                        <label>فصيلة الدم</label>
                        <select id="reg-blood" required>
                            <option value="">اختر</option>
                            <option>A+</option><option>A-</option>
                            <option>B+</option><option>B-</option>
                            <option>AB+</option><option>AB-</option>
                            <option>O+</option><option>O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>العنوان (مكان السكن)</label>
                        <input type="text" id="reg-address" required>
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="reg-password" required>
                    </div>
                    <div class="form-group">
                        <label>تأكيد كلمة المرور</label>
                        <input type="password" id="reg-confirm" required>
                    </div>
                    <button type="submit" class="btn" style="width:100%;">إنشاء الحساب</button>
                </form>
                <p style="text-align:center; margin-top:15px;">
                    لديك حساب؟ <a href="index.html" style="color:#8B0000; font-weight:bold;">سجل دخول</a>
                </p>
            </div>
            <div class="login-image">
                <div class="image-content">
                    <h2>🩸 انضم إلينا ... كن متبرعاً</h2>
                    <p>سجل الآن وابدأ رحلة العطاء</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container"><p>© 2026 بنك الدم الخيري</p></div>
    </footer>
</body>
</html>
