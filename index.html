<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الدم الخيري</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div class="login-page">
        <div class="login-container">
            <div class="login-form">
                <div class="logo-login">🩸 <span>بنك الدم</span> الخيري</div><hr>
                <h2> تسجيل الدخول</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="login-email" required placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <button type="submit" class="btn" style="width:100%;">دخول</button>
                </form>
                <p style="text-align:center; margin-top:15px;">
                    ليس لديك حساب؟ <a href="register.html" style="color:#8B0000; font-weight:bold;">سجل الآن</a>
                </p>
            </div>
            <div class="login-image">
                <div class="image-content">
                    <h2>🩸 تبرع بالدم ... أنقذ حياة</h2>
                    <p>كون جزءاً من حملة التبرع بالدم وساعد المرضى</p>
                </div>
            </div>
        </div>
    </div>
    <footer class="footer">
        <div class="container"><p>© 2026 بنك الدم الخيري - جميع الحقوق محفوظة</p></div>
    </footer>
</body>
</html>
